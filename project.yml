name: GroqDictate
options:
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  GroqDictate:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: GroqDictate/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.groqdictate
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: GroqDictate/Info.plist
        CODE_SIGN_ENTITLEMENTS: GroqDictate/GroqDictate.entitlements
        CODE_SIGN_STYLE: Automatic
        SWIFT_OPTIMIZATION_LEVEL[config=Release]: -Osize
        OTHER_LDFLAGS:
          - -Xlinker
          - -dead_strip
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: GroqDictate/GroqDictate.entitlements
