name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build (${{ matrix.configuration }})
        run: |
          xcodebuild \
            -project GroqDictate.xcodeproj \
            -scheme GroqDictate \
            -configuration "${{ matrix.configuration }}" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test (Debug)
        run: |
          xcodebuild \
            -project GroqDictate.xcodeproj \
            -scheme GroqDictate \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test
