name: Bug report
description: Report a reproducible problem in GroqDictate
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide clear reproduction steps.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch app with `make dev`
        2. Press Right ⌘
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. 15.3.1"
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version / commit
      placeholder: "e.g. main@abc1234"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Build / install method
      options:
        - make dev
        - make release
        - Xcode Run
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs (for example `~/Library/Logs/GroqDictate/app.log` when enabled).
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, videos, or related details.
